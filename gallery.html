<!DOCTYPE html><html><head><title>Gallery</title><link rel="stylesheet" href="css/style.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script></head><body><header><h1>Our Activities</h1></header><section class="gallery-grid" id="gallery"></section><script>

const supabase = supabase.createClient(
"https://plrzyhtkosbgztpaudoz.supabase.co",
"sb_publishable_iCAQVtvq6NqndBcS2ktKQA_im69KCae"
)

async function loadGallery(){

const {data} = await supabase
.from("gallery")
.select("*")

const container=document.getElementById("gallery")

data.forEach(item=>{

const img=document.createElement("img")

img.src=item.image

container.appendChild(img)

})

}

loadGallery()

</script></body></html>
