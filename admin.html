<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Admin Dashboard</title>

<link rel="stylesheet" href="style.css">

</head>

<body class="admin-body">

<div class="admin-container">

<h1>Admin Dashboard</h1>

<p>Manage website content and charity projects.</p>


<h2>Website Logo</h2>

<input type="file" id="logoFile" accept="image/*">

<button onclick="uploadLogo()" class="publish-btn">
Update Logo
</button>


<hr>


<h2>Publish Project</h2>

<input id="title" placeholder="Project Title">

<textarea id="desc" placeholder="Project Description"></textarea>

<label>Upload Photo</label>
<input type="file" id="image" accept="image/*">

<label>Upload Video</label>
<input type="file" id="video" accept="video/*">

<button onclick="addPost()" class="publish-btn">

Publish Project

</button>

</div>


<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="script.js"></script>

</body>
</html>
